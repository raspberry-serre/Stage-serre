<!DOCTYPE html>
<html lang="fr">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Données Serre</title>
    <link rel="stylesheet" href="{% static 'style/style.css' %}">
</head>
<body>
    <!-- connection logs -->
    <div class="card" id="logsCard">
        <div class="card-value" id="logsContent">
            {% if logs %}
                <ul>
                {% for line in logs %}
                    <li>{{ line }}</li>
                {% endfor %}
                </ul>
            {% else %}
                <em>Aucune donnée</em>
            {% endif %}
        </div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
