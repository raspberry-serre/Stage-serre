<!DOCTYPE html>
<html lang="fr">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Données Serre</title>
    <link rel="stylesheet" href="{% static 'style/style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Données Serre</h1>
            </div>
            <div class="status">
                <form method="POST">
                    {% csrf_token %}
                    <button id="toitBtn"
                            name="commande"
                            value="{% if toit == 0 %}toit_open{% else %}toit_close{% endif %}">
                        {% if toit == 0 %}Ouvrir{% else %}Fermer{% endif %}
                    </button>
                </form>
                <div class="status-indicator"></div>
                <div>
                    <div class="last-update">Dernière mise à jour: <span id="lastUpdate">--:--:--</span></div>
                </div>
            </div>
        </header>

        <div class="error-message" id="errorMessage"></div>
        
        <div class="data-grid">
            <div class="card" id="tempCard">
                <div class="card-title">Température</div>
                <div class="card-value">-- °C</div>
            </div>
            <div class="card" id="humCard">
                <div class="card-title">Humidité Air</div>
                <div class="card-value">-- %</div>
            </div>
            <div class="card" id="solCard">
                <div class="card-title">Humidité Sol</div>
                <div class="card-value">-- %</div>
            </div>
            <div class="card" id="lumiereCard">
                <div class="card-title">Luminosité</div>
                <div class="card-value">-- Lux</div>
            </div>
            <div class="card" id="ledCard">
                <div class="card-title">LED</div>
                <div class="card-value">--</div>
            </div>
            <div class="card" id="servoCard">
                <div class="card-title">Servo</div>
                <div class="card-value">-- °</div>
            </div>
            <div class="card" id="periodeCard">
                <div class="card-title">Période</div>
                <div class="card-value">--</div>
            </div>
            <div class="card" id="pompeCard">
                <div class="card-title">Pompe</div>
                <div class="card-value">--</div>
            </div>
            <div class="card" id="lockCard">
                <div class="card-title">Pompe Lock</div>
                <div class="card-value">-- s</div>
            </div>
        </div>

        <div class="card" id="logsCard">
            <div class="card-title">Dernières Données</div>
            <div class="card-value" id="logsContent">
                <em>Chargement...</em>
            </div>
        </div>
    </div>

    <script src="{% static 'js/index.js' %}"></script>

</body>
</html>
