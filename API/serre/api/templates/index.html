<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Données Serre - Rafraîchissement Automatique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #333;
            font-size: 28px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #4CAF50;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-update {
            color: #666;
            font-size: 12px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .card.warning .card-value {
            color: #ff9800;
        }

        .card.danger .card-value {
            color: #f44336;
        }

        .history-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .history-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #667eea;
            color: white;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        .timestamp {
            color: #999;
            font-size: 12px;
        }

        .error-message {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #764ba2;
        }

        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .refresh-rate {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Données Serre</h1>
            </div>
            <div class="status">
                <div class="status-indicator"></div>
                <div>
                    <div class="last-update">Dernière mise à jour: <span id="lastUpdate">--:--:--</span></div>
                </div>
            </div>
        </header>

        <div class="error-message" id="errorMessage"></div>

        <div class="controls">
                Intervalle: <span id="refreshRate">5</span>s
                <input type="range" id="refreshInput" min="1" max="30" value="5" style="width: 100px; vertical-align: middle;" onchange="changeRefreshRate(this.value)">
            </div>
        </div>

        <div class="data-grid">
            <div class="card" id="tempCard">
                <div class="card-title">Température</div>
                <div class="card-value">-- °C</div>
            </div>
            <div class="card" id="humCard">
                <div class="card-title">Humidité Air</div>
                <div class="card-value">-- %</div>
            </div>
            <div class="card" id="solCard">
                <div class="card-title">Humidité Sol</div>
                <div class="card-value">-- %</div>
            </div>
            <div class="card" id="lumiereCard">
                <div class="card-title">Luminosité</div>
                <div class="card-value">-- Lux</div>
            </div>
            <div class="card" id="servoCard">
                <div class="card-title">Servo</div>
                <div class="card-value">-- °</div>
            </div>
            <div class="card" id="periodeCard">
                <div class="card-title">Période</div>
                <div class="card-value">--</div>
            </div>
            <div class="card" id="pompeCard">
                <div class="card-title">Pompe</div>
                <div class="card-value">--</div>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshEnabled = true;
        let refreshInterval = 5000; // 5 secondes
        let refreshTimer = null;

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('fr-FR');
        }

        async function refreshData() {
            try {
                // Récupérer la dernière donnée
                const lastResponse = await fetch('/api/last/');
                if (!lastResponse.ok) throw new Error('Erreur API');
                const lastData = await lastResponse.json();

                // Mettre à jour les cartes
                updateCard('tempCard', lastData.temp.toFixed(1), '°C');
                updateCard('humCard', lastData.hum.toFixed(1), '%');
                updateCard('solCard', lastData.sol, '%');
                updateCard('lumiereCard', lastData.lumière, 'Lux');
                updateCard('servoCard', lastData.servo, '°');
                updateCard('periodeCard', lastData.periode, '');
                updateCard('pompeCard', lastData.pompe, '');

                // Ajouter une classe de mise à jour
                document.querySelectorAll('.card').forEach(card => {
                    card.style.animation = 'none';
                    setTimeout(() => {
                        card.style.animation = 'pulse 0.5s ease-in-out';
                    }, 10);
                });

                updateLastUpdate();

            } catch (error) {
                console.error('Erreur lors du rafraîchissement:', error);
                document.getElementById('errorMessage').textContent = '❌ Erreur de connexion à l\'API: ' + error.message;
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function updateCard(cardId, value, unit) {
            const card = document.getElementById(cardId);
            const valueElement = card.querySelector('.card-value');
            valueElement.textContent = value + (unit ? ' ' + unit : '');

            // Ajouter des classes de couleur selon les valeurs
            card.classList.remove('warning', 'danger');
            if (cardId === 'tempCard' && parseFloat(value) > 30) {
                card.classList.add('danger');
            } else if (cardId === 'humCard' && parseFloat(value) > 80) {
                card.classList.add('warning');
            }
        }


        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const btn = document.getElementById('toggleAutoBtn');
            if (autoRefreshEnabled) {
                btn.textContent = '⏸️ Arrêter le rafraîchissement';
                startAutoRefresh();
            } else {
                btn.textContent = '▶️ Reprendre le rafraîchissement';
                clearInterval(refreshTimer);
            }
        }

        function startAutoRefresh() {
            clearInterval(refreshTimer);
            refreshTimer = setInterval(() => {
                if (autoRefreshEnabled) {
                    refreshData();
                }
            }, refreshInterval);
        }

        function changeRefreshRate(value) {
            refreshInterval = parseInt(value) * 1000;
            document.getElementById('refreshRate').textContent = value;
            if (autoRefreshEnabled) {
                startAutoRefresh();
            }
        }

        // Initialiser
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            startAutoRefresh();
        });

        // Rafraîchir quand on revient sur la page
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && autoRefreshEnabled) {
                refreshData();
            }
        });
    </script>
</body>
</html>
